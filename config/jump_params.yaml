# ─────────────────────────────────────────────
# Manual safe jump mode
# Used only by: rosservice call /alpine/jump
# This mode commands valves + local rope forces.
# ─────────────────────────────────────────────

# Fallback generale: usato se il codice non ha ancora i parametri left/right.
manual_up_force: 40.0
manual_mid_force: 32.0
manual_hold_force: 25.0

manual_phase1_ms: 220.0
manual_phase2_ms: 700.0
manual_phase3_ms: 250.0
manual_phase4_ms: 80.0

# ─────────────────────────────────────────────
# Bilanciamento sinistra/destra manual jump
# Il robot è andato a destra: quindi destro più debole.
# Questi parametri funzionano se hai applicato la patch left/right.
# ─────────────────────────────────────────────

manual_up_force_left: 42.0
manual_up_force_right: 42.0

manual_mid_force_left: 29.0
manual_mid_force_right: 29.0

manual_hold_force_left: 20.0
manual_hold_force_right: 20.0

manual_start_hold_force_left: 26.0
manual_start_hold_force_right: 26.0

manual_min_start_force_abs: 5.0

# ─────────────────────────────────────────────
# Timing entrata corde
# Corde entrano dopo un piccolo delay, mentre valve1 è ancora aperta.
# ─────────────────────────────────────────────

manual_rope_start_after_thrust: true
manual_rope_extra_delay_ms: 0.0

manual_rope_entry_delay_ms: 0.0
manual_torque_entry_hold_ms: 250.0

# ─────────────────────────────────────────────
# Manual valve profile
# valve2 resta a 30°, valve1 spinge e poi si richiude.
# ─────────────────────────────────────────────

manual_valve2_hold_deg: 30.0
manual_valve2_preopen_ms: 50.0

manual_valve1_pulse_deg: 90.0
manual_valve1_pulse_ms: 300.0

# ─────────────────────────────────────────────
# Manual /alpine/jump anti-strappo corde
# ─────────────────────────────────────────────

manual_use_measured_preload: true

# 0 per evitare una fase iniziale lunga solo di preload.
manual_preload_hold_ms: 0.0

manual_hold_preload_during_thrust: true

# Rampa più morbida per evitare protezione/idle.
manual_rope_force_ramp_ms: 360.0
manual_rope_force_ramp_steps: 18

manual_preload_force_clip_n: 80.0
manual_preload_feedback_max_age_s: 0.50

# Conversione segno telemetry -> command.
manual_preload_left_feedback_sign: 1.0
manual_preload_right_feedback_sign: -1.0

# Mai fallback a 0 N.
manual_preload_fallback_left_force: -26.0
manual_preload_fallback_right_force: -26.0

# ─────────────────────────────────────────────
# Optimized Fleg mode
# Used by: /alpine_body/command
# ─────────────────────────────────────────────

piston_diameter_m: 0.032
supply_pressure_bar: 3.6

body_thrust_ms: 300.0

body_inlet_min_deg: 0.0
body_inlet_max_deg: 90.0

body_exhaust_ms: 2500.0
body_exhaust_opening_deg: 90.0

body_final_close_ms: 200.0
min_valid_fleg_n: 1.0

# ─────────────────────────────────────────────
# IMU diagnostic / calibration
# ─────────────────────────────────────────────

imu_calib_enabled: true
imu_baseline_window_s: 0.50
imu_post_window_s: 0.25
imu_valve_threshold_deg: 1.0

# ─────────────────────────────────────────────
# Experimental J_des -> inlet_deg lookup
# ─────────────────────────────────────────────

robot_mass_kg: 10.0

jreal_delta_v_table: [0.25, 1.45, 1.75, 1.85]
jreal_inlet_deg_table: [20.0, 30.0, 40.0, 90.0]

jreal_min_impulse_ns: 0.0
jreal_max_inlet_deg: 90.0
# After manual jump: hold reached rope position instead of torque hold.
manual_finish_position_hold_enabled: true
manual_finish_position_feedback_max_age_s: 0.50
manual_finish_position_hold_offset_m: 0.005

manual_finish_torque_hold_enabled: false

manual_finish_torque_hold_left_force: 20.0

manual_finish_torque_hold_right_force: 20.0

manual_finish_torque_hold_refresh_div: 1

manual_finish_torque_hold_left_force_max: 24.0

manual_finish_torque_hold_right_force_max: 24.0

manual_finish_antisag_enabled: false

manual_finish_antisag_deadband_m: 0.002

manual_finish_antisag_step_n: 1.0

manual_finish_antisag_decay_n: 0.05

manual_finish_antisag_sign: 1.0

# Softer separated final position hold offsets.
manual_finish_position_hold_offset_left_m: -0.010
manual_finish_position_hold_offset_right_m: -0.010

manual_return_to_takeoff_enabled: true

manual_return_to_takeoff_duration_s: 3.5

manual_return_to_takeoff_offset_left_m: 0.0

manual_return_to_takeoff_offset_right_m: 0.0

manual_torque_handover_before_valves_enabled: true

manual_torque_handover_before_valves_ms: 350.0

manual_torque_handover_sleep_s: 0.05
