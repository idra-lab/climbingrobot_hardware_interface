# ALPINE propeller configuration.
#
# Load this file globally, so the parameters are available under:
#   /alpine/propellers/low_level/...
#
# The current dongle_node reads:
#   pitch/deadband_deg
#   pitch/pid/kp, ki, kd
#   pitch/umax
#   yaw/deadband_deg
#   yaw/pid/kp, kd
#   yaw/umax
#   startup/send_attzero_on_start
#   startup/enable_attitude_hold_on_start
#   startup/enable_open_loop_on_start
#
# The thrust_map section is a shared reference copy. The current ESP32 firmware
# contains the same lookup table internally.

alpine:
  propellers:
    thrust_map:
      source: "QX-MOTOR QF2611PRO 3100KV datasheet"
      interpolation: "piecewise_linear"
      command_step: 0.01

      command: [0.50, 0.51, 0.52, 0.53, 0.54, 0.55, 0.56, 0.57, 0.58, 0.59, 0.60, 0.61, 0.62, 0.63, 0.64, 0.65, 0.66, 0.67, 0.68, 0.69, 0.70, 0.71, 0.72, 0.73, 0.74, 0.75, 0.76, 0.77, 0.78, 0.79, 0.80, 0.81, 0.82, 0.83, 0.84, 0.85, 0.86, 0.87, 0.88, 0.89, 0.90, 0.91, 0.92, 0.93, 0.94, 0.95, 0.96, 0.97, 0.98, 0.99, 1.00]
      force_n: [4.810, 4.947, 5.084, 5.221, 5.358, 5.495, 5.632, 5.769, 5.906, 6.043, 6.180, 6.297, 6.414, 6.531, 6.648, 6.765, 6.882, 6.999, 7.116, 7.233, 7.350, 7.576, 7.802, 8.028, 8.254, 8.480, 8.706, 8.932, 9.158, 9.384, 9.610, 9.836, 10.062, 10.288, 10.514, 10.740, 10.966, 11.192, 11.418, 11.644, 11.870, 12.086, 12.302, 12.518, 12.734, 12.950, 13.166, 13.382, 13.598, 13.814, 14.030]

      min_mapped_command: 0.50
      min_mapped_force_n: 4.810
      max_mapped_command: 1.00
      max_mapped_force_n: 14.030

    low_level:
      startup:
        # Informational here: dongle startup application is enabled through the
        # private ROS parameter ~apply_propeller_config_on_start in the launch file.
        apply_config_on_start: true
        send_attzero_on_start: true
        enable_attitude_hold_on_start: true
        enable_open_loop_on_start: false

      pitch:
        deadband_deg: 15.0

        # The onboard pitch PID remains normalized.
        pid:
          kp: 1.20
          ki: 0.00
          kd: 0.05

        # Maximum thrust of the active pitch EDF [N].
        # The dongle sends: umax 14.030
        umax: 14.030

        # Documentation of the hardcoded firmware activation floor.
        min_active_command: 0.80
        min_active_force_n: 9.610

      yaw:
        deadband_deg: 12.0

        # The onboard yaw PID remains normalized.
        pid:
          kp: 0.90
          kd: 0.04

        # Maximum thrust per EDF of the active yaw pair [N].
        # The dongle sends: yumax 6.180
        umax: 6.180

        # Documentation of the hardcoded firmware activation floor.
        min_active_command: 0.60
        min_active_force_n: 6.180